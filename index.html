<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data Event VR - TRIESAKTI EDUTAINMENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); }
    </style>
</head>

    <div class="text-center mb-8">
    <div class="flex items-center justify-center mx-auto mb-4">
        <img src="logo Edutainment.png" alt="Logo Triesakti Edutainment" class="h-20 w-auto object-contain shadow-sm">
    </div>
    <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Input Data Event</h2>
    <p class="text-slate-500 text-sm font-medium">TRIESAKTI EDUTAINMENT - Sistem Cloud</p>
</div>
    
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 border border-slate-100">
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                <i class="fas fa-vr-cardboard text-white text-3xl"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Input Data Event</h2>
            <p class="text-slate-500 text-sm font-medium">TRIESAKTI EDUTAINMENT - Sistem Cloud</p>
        </div>

        <form id="formEvent" class="space-y-4">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1">Nama Sekolah</label>
                <input type="text" id="namaSekolah" placeholder="Nama SMA/SMK" 
                    class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition shadow-sm text-sm font-semibold" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1">Tanggal</label>
                    <input type="date" id="tanggalEvent" 
                        class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition shadow-sm text-sm" required>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1">Wilayah/Kota</label>
                    <select id="kota" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition shadow-sm text-sm cursor-pointer font-semibold" required>
                        <option value="">Pilih Kota</option>
                        <option>Makassar</option><option>Maros</option><option>Palopo</option><option>Tarakan</option>
                        <option>Berau</option><option>Banjarmasin</option><option>Mataram</option>
                        <option>Samarinda</option><option>Tenggarong</option><option>Batam</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1">Durasi (Hari)</label>
                    <input type="number" id="durasi" value="1" min="1" oninput="updateSesi()"
                        class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition shadow-sm text-sm" required>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1">Sesi</label>
                    <select id="sesi" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition shadow-sm text-sm cursor-pointer font-semibold">
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 bg-blue-50 p-4 rounded-2xl border border-blue-100">
                <div>
                    <label class="block text-[10px] font-black text-blue-400 uppercase mb-1">Jml Siswa (Dapodik)</label>
                    <input type="number" id="dapodik" placeholder="0" 
                        class="w-full p-2.5 bg-white border border-blue-100 rounded-lg outline-none focus:border-blue-500 text-sm font-bold" required>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-blue-400 uppercase mb-1">Siswa Ikut VR</label>
                    <input type="number" id="vr" placeholder="0" 
                        class="w-full p-2.5 bg-white border border-blue-100 rounded-lg outline-none focus:border-blue-500 text-sm font-bold text-blue-700" required>
                </div>
            </div>

            <button type="submit" id="btnSave" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl hover:bg-blue-600 transition-all duration-300 shadow-xl shadow-slate-200 mt-4 flex items-center justify-center tracking-widest text-sm">
                <i class="fas fa-paper-plane mr-2"></i> SIMPAN KE DATABASE
            </button>
        </form>

        <p class="text-center text-[9px] text-slate-400 mt-6 uppercase tracking-[0.2em] font-bold">TRIESAKTI EDUTAINMENT • Real-Time System</p>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxziioX9qXZedgZPMoYnizMj9IxeN7jHzfCDYckRRYJ87CryWvnxyLPQvacWazA-Rc/exec';

        // Logika Sesi Otomatis
        function updateSesi() {
            const d = document.getElementById('durasi').value;
            const s = document.getElementById('sesi');
            s.innerHTML = '';
            if(d == 1) {
                s.add(new Option('Fullday', 'Fullday'));
            } else {
                for(let i=1; i<=d; i++) {
                    s.add(new Option('Hari ke-' + i, 'Hari ke-' + i));
                }
            }
        }
        window.onload = updateSesi;

        // Proses Pengiriman Data
        document.getElementById('formEvent').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSave');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> MENGIRIM...';

            const payload = {
                namaSekolah: document.getElementById('namaSekolah').value,
                tanggalEvent: document.getElementById('tanggalEvent').value,
                kota: document.getElementById('kota').value,
                sesiEvent: document.getElementById('sesi').value,
                siswaDapodik: document.getElementById('dapodik').value,
                siswaVR: document.getElementById('vr').value
            };

            try {
                // Mengirim data menggunakan metode POST ke Google Apps Script
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors', // Mengizinkan pembacaan respon
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                // Google Apps Script akan mengalihkan (redirect), fetch akan menangkapnya sebagai sukses
                alert('🚀 Sukses! Data berhasil masuk ke Google Sheet.');
                document.getElementById('formEvent').reset();
                updateSesi();
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Terjadi kesalahan. Cek koneksi atau pastikan Deploy Apps Script sudah "Anyone".');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> SIMPAN KE DATABASE';
            }
        });
    </script>
</body>
</html>
