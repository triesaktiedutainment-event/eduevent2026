<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Report - Triesakti Edutainment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .chart-box { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="login-modal" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[999]">
        <div class="bg-white p-10 rounded-[2.5rem] max-w-sm w-full text-center shadow-2xl">
            <img src="logo Edutainment.png" alt="Logo" class="h-16 mx-auto mb-6">
            <h2 class="text-xl font-black uppercase mb-4 text-slate-800">Akses Pimpinan</h2>
            <input type="password" id="access-code" placeholder="Kode Akses..." 
                class="w-full p-4 bg-slate-100 rounded-2xl mb-4 text-center font-bold outline-none border-2 focus:border-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition shadow-lg uppercase tracking-widest">
                Buka Laporan
            </button>
            <p id="err" class="text-red-500 text-xs mt-4 hidden font-bold">Kode Salah!</p>
        </div>
    </div>

    <div id="main-content" class="hidden p-4 md:p-8">
        <div class="max-w-7xl mx-auto">
            
            <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-4">
                    <img src="logo Edutainment.png" alt="Logo" class="h-10">
                    <h1 class="text-lg font-black text-slate-900 uppercase">Monitoring VR: <span id="wil" class="text-blue-600"></span></h1>
                </div>
                <button onclick="location.reload()" class="bg-red-50 text-red-600 px-5 py-2 rounded-xl text-[10px] font-black hover:bg-red-600 hover:text-white transition uppercase">Logout</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass-card p-8 rounded-[2rem] border-b-8 border-slate-800 text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Total Sekolah</p>
                    <h2 id="st-sekolah" class="text-5xl font-black text-slate-800">0</h2>
                </div>
                <div class="glass-card p-8 rounded-[2rem] border-b-8 border-blue-600 text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Peserta VR</p>
                    <h2 id="st-vr" class="text-5xl font-black text-blue-600">0</h2>
                </div>
                <div class="glass-card p-8 rounded-[2rem] border-b-8 border-emerald-500 text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Capaian</p>
                    <h2 id="st-pct" class="text-5xl font-black text-emerald-600">0%</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h3 class="text-xs font-black text-slate-400 uppercase mb-6"><i class="fas fa-chart-pie mr-2 text-blue-500"></i> Komposisi Peserta</h3>
                    <div class="chart-box"><canvas id="chartPie"></canvas></div>
                </div>
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h3 class="text-xs font-black text-slate-400 uppercase mb-6"><i class="fas fa-chart-bar mr-2 text-emerald-500"></i> Performa per Sekolah</h3>
                    <div class="chart-box"><canvas id="chartBar"></canvas></div>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-slate-100">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b">
                        <tr>
                            <th class="p-6">Nama Sekolah</th>
                            <th class="p-6 text-center">Dapodik</th>
                            <th class="p-6 text-center">VR</th>
                            <th class="p-6 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tb-body" class="divide-y divide-slate-50 text-sm font-bold text-slate-700 uppercase"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxziioX9qXZedgZPMoYnizMj9IxeN7jHzfCDYckRRYJ87CryWvnxyLPQvacWazA-Rc/exec';
        const ACCESS = { "admin123": "PIMPINAN PUSAT", "maros2026": "MAROS", "palopo2026": "PALOPO", "tarakan2026": "TARAKAN", "makassar2026": "MAKASSAR" };
        let currentWil = "";
        let charts = {};

        function handleLogin() {
            const code = document.getElementById('access-code').value.trim();
            if (ACCESS[code]) {
                currentWil = ACCESS[code];
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('wil').innerText = currentWil;
                fetchData();
            } else {
                document.getElementById('err').classList.remove('hidden');
            }
        }

        async function fetchData() {
            try {
                const res = await fetch(SCRIPT_URL + "?nocache=" + new Date().getTime());
                const data = await res.json();
                const filtered = data.filter(item => {
                    if(currentWil === "PIMPINAN PUSAT") return true;
                    const keyWil = Object.keys(item).find(k => k.toLowerCase().includes('wilayah') || k.toLowerCase().includes('kota'));
                    return item[keyWil]?.toString().trim().toUpperCase() === currentWil;
                });
                render(filtered);
            } catch (e) { alert("Gagal mengambil data."); }
        }

        function render(data) {
            let totalVR = 0, totalDapo = 0, labels = [], values = [];
            
            const rows = data.map(item => {
                const v = parseInt(item.siswaikutvr || item.siswavr || 0);
                const d = parseInt(item.jmlsiswadapodik || item.siswadapodik || 0);
                const s = item.namasekolah || "Sekolah";

                totalVR += v; totalDapo += d;
                labels.push(s);
                values.push(v);

                const p = d > 0 ? ((v/d)*100).toFixed(0) : 0;
                return `<tr class="hover:bg-slate-50">
                    <td class="p-6 font-black">${s}</td>
                    <td class="p-6 text-center">${d}</td>
                    <td class="p-6 text-center text-blue-600 font-black">${v}</td>
                    <td class="p-6 text-center"><span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black">${p}%</span></td>
                </tr>`;
            }).join('');

            document.getElementById('st-sekolah').innerText = data.length;
            document.getElementById('st-vr').innerText = totalVR.toLocaleString('id-ID');
            document.getElementById('st-pct').innerText = (totalDapo > 0 ? ((totalVR/totalDapo)*100).toFixed(1) : 0) + '%';
            document.getElementById('tb-body').innerHTML = rows || '<tr><td colspan="4" class="p-10 text-center uppercase">Data Kosong</td></tr>';

            // JALANKAN FUNGSI GRAFIK
            updateCharts(labels, values);
        }

        function updateCharts(labels, values) {
            const ctxPie = document.getElementById('chartPie').getContext('2d');
            const ctxBar = document.getElementById('chartBar').getContext('2d');
            const colors = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];

            // Hapus grafik lama jika sudah ada
            if(charts.pie) charts.pie.destroy();
            if(charts.bar) charts.bar.destroy();

            // Buat Grafik Pie (Doughnut)
            charts.pie = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        hoverOffset: 10
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10, weight: 'bold' } } } }
                }
            });

            // Buat Grafik Bar
            charts.bar = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Siswa VR',
                        data: values,
                        backgroundColor: '#10b981',
                        borderRadius: 5
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true }, x: { ticks: { font: { size: 9 } } } }
                }
            });
        }
    </script>
</body>
</html>
