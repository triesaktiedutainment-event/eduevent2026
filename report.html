<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Report - Triesakti Edutainment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div id="login-modal" class="fixed inset-0 bg-slate-900/95 flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-[2rem] p-10 max-w-sm w-full shadow-2xl border border-slate-200 text-center">
            <img src="logo Edutainment.png" alt="Logo" class="h-16 mx-auto mb-6 drop-shadow-md">
            <h2 class="text-xl font-black text-slate-800 uppercase mb-2">Akses Pimpinan</h2>
            <p class="text-slate-400 text-[10px] mb-6 font-bold uppercase tracking-widest">Masukkan Kode Wilayah</p>
            
            <input type="password" id="access-code" placeholder="••••••••" 
                class="w-full p-4 bg-slate-50 border-2 border-slate-100 focus:border-blue-500 rounded-2xl outline-none text-center font-bold tracking-widest mb-4 transition-all">
            
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition shadow-lg active:scale-95 text-sm tracking-widest">
                BUKA LAPORAN
            </button>
            
            <p id="login-error" class="text-red-500 text-xs mt-4 hidden font-bold">
                <i class="fas fa-exclamation-circle mr-1"></i> Kode Akses Salah!
            </p>
        </div>
    </div>

    <div id="main-content" class="hidden opacity-0 transition-opacity duration-700">
        <div class="max-w-7xl mx-auto p-4 md:p-8">
            
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white/50 p-6 rounded-[2rem] border border-white">
                <div class="flex items-center gap-4">
                    <img src="logo Edutainment.png" alt="Logo" class="h-12">
                    <div>
                        <h1 class="text-xl font-black text-slate-900 uppercase">Monitoring Event VR</h1>
                        <p class="text-blue-600 font-bold text-[10px] uppercase tracking-widest">Wilayah: <span id="access-level"></span></p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="fetchData()" class="bg-white px-5 py-2.5 rounded-xl text-[10px] font-black text-slate-700 shadow-sm border border-slate-200 hover:bg-blue-50 transition-all uppercase">
                        <i class="fas fa-sync-alt mr-2"></i> Update Data
                    </button>
                    <button onclick="location.reload()" class="bg-red-50 text-red-600 px-5 py-2.5 rounded-xl text-[10px] font-black hover:bg-red-600 hover:text-white transition uppercase">Logout</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass-card p-8 rounded-[2.5rem] border-b-4 border-slate-800 text-center">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Total Sekolah</p>
                    <h2 id="stat-sekolah" class="text-5xl font-black text-slate-800 tracking-tighter text-center">0</h2>
                </div>
                <div class="glass-card p-8 rounded-[2.5rem] border-b-4 border-blue-600 text-center">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Partisipan VR</p>
                    <h2 id="stat-vr" class="text-5xl font-black text-blue-600 tracking-tighter text-center">0</h2>
                </div>
                <div class="glass-card p-8 rounded-[2.5rem] border-b-4 border-emerald-500 text-center">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Efektivitas</p>
                    <h2 id="stat-persen" class="text-5xl font-black text-emerald-600 tracking-tighter text-center">0%</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-8 glass-card p-8 rounded-[2.5rem]">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6"><i class="fas fa-chart-bar mr-2 text-blue-500"></i> Grafik Performa Sekolah</h3>
                    <div style="position: relative; height:300px; width:100%"><canvas id="chartUtama"></canvas></div>
                </div>

                <div class="lg:col-span-4 glass-card p-8 rounded-[2.5rem]">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6"><i class="fas fa-chart-pie mr-2 text-purple-500"></i> Komposisi Data</h3>
                    <div style="position: relative; height:300px; width:100%"><canvas id="chartLingkaran"></canvas></div>
                </div>

                <div class="lg:col-span-12 glass-card rounded-[2.5rem] overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] uppercase font-black text-slate-400 border-b border-slate-100">
                                <tr>
                                    <th class="p-6">Nama Sekolah</th>
                                    <th class="p-6 text-center">Siswa Dapodik</th>
                                    <th class="p-6 text-center">Peserta VR</th>
                                    <th class="p-6 text-center">Status</th>
                                </tr>
                            </thead>
                            <tbody id="tabel-body" class="divide-y divide-slate-100 text-sm font-bold text-slate-700"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxakRVXqjxR4LLLrtnFL_c1vudbIGlaW0WapsfUiRsO3JMYhCGzmiRHWIBWfvlbdzg7/exec';
        
        const ACCESS_KEYS = {
            "admin123": "PIMPINAN PUSAT",
            "maros2026": "MAROS",
            "makassar2026": "MAKASSAR",
            "palopo2026": "PALOPO",
            "tarakan2026": "TARAKAN"
        };

        let currentAccess = "";
        let myCharts = {};

        // FUNGSI TOMBOL LOGIN (DIPERBAIKI)
        function handleLogin() {
            const inputVal = document.getElementById('access-code').value.trim();
            
            if (ACCESS_KEYS[inputVal]) {
                currentAccess = ACCESS_KEYS[inputVal];
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                setTimeout(() => { document.getElementById('main-content').classList.add('opacity-100'); }, 50);
                
                document.getElementById('access-level').innerText = currentAccess;
                fetchData();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
                setTimeout(() => { document.getElementById('login-error').classList.add('hidden'); }, 3000);
            }
        }

        async function fetchData() {
            try {
                const res = await fetch(SCRIPT_URL + "?t=" + new Date().getTime());
                const data = await res.json();
                
                let filtered = data;
                if (currentAccess !== "PIMPINAN PUSAT") {
                    filtered = data.filter(item => {
                        const wilayahKey = Object.keys(item).find(k => k.includes('wilayah') || k.includes('kota'));
                        const val = item[wilayahKey] ? item[wilayahKey].toString().trim().toUpperCase() : "";
                        return val === currentAccess.toUpperCase();
                    });
                }
                renderDashboard(filtered);
            } catch (e) {
                console.error("Fetch Error:", e);
            }
        }

        function renderDashboard(data) {
            let totalVR = 0, totalDapo = 0;
            const labels = [], values = [];

            const rows = data.map(item => {
                const vr = parseInt(item.siswavr) || 0;
                const dapo = parseInt(item.siswadapodik) || 0;
                totalVR += vr;
                totalDapo += dapo;
                labels.push(item.namasekolah);
                values.push(vr);

                const pct = dapo > 0 ? ((vr/dapo)*100).toFixed(0) : 0;
                return `<tr class="hover:bg-slate-50 transition-all">
                    <td class="p-6 font-black text-slate-800 uppercase">${item.namasekolah}</td>
                    <td class="p-6 text-center font-mono">${dapo}</td>
                    <td class="p-6 text-center text-blue-600 font-black">${vr}</td>
                    <td class="p-6 text-center"><span class="bg-blue-100 text-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black">${pct}% SIAP</span></td>
                </tr>`;
            }).join('');

            document.getElementById('stat-sekolah').innerText = data.length;
            document.getElementById('stat-vr
