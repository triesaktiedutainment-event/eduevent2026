<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Report - Triesakti Edutainment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 min-h-screen">

    <div id="login-modal" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[999]">
        <div class="bg-white p-10 rounded-[2.5rem] max-w-sm w-full text-center shadow-2xl">
            <img src="logo Edutainment.png" alt="Logo" class="h-16 mx-auto mb-6">
            <h2 class="text-xl font-black uppercase mb-4 text-slate-800 tracking-tighter">Akses Pimpinan</h2>
            <input type="password" id="access-code" placeholder="Kode Akses..." 
                class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl mb-4 text-center font-bold outline-none focus:border-blue-500 transition-all">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition shadow-lg uppercase tracking-widest text-sm">
                Buka Laporan
            </button>
            <p id="err" class="text-red-500 text-xs mt-4 hidden font-bold">Kode Akses Salah!</p>
        </div>
    </div>

    <div id="main-content" class="hidden p-4 md:p-8">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-6 rounded-3xl shadow-sm border border-white">
                <div class="flex items-center gap-4">
                    <img src="logo Edutainment.png" alt="Logo" class="h-10">
                    <h1 class="text-lg font-black text-slate-900 uppercase">Monitoring VR: <span id="wil" class="text-blue-600"></span></h1>
                </div>
                <div class="flex gap-2">
                    <button onclick="fetchData()" class="bg-slate-100 px-5 py-2.5 rounded-xl text-[10px] font-black text-slate-600 hover:bg-blue-50 hover:text-blue-600 transition uppercase"><i class="fas fa-sync-alt mr-2"></i> Refresh</button>
                    <button onclick="location.reload()" class="bg-red-50 text-red-600 px-5 py-2.5 rounded-xl text-[10px] font-black hover:bg-red-600 hover:text-white transition uppercase">Logout</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-slate-800">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Total Sekolah</p>
                    <h2 id="st-sekolah" class="text-5xl font-black text-slate-800">0</h2>
                </div>
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-blue-600">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Total Peserta VR</p>
                    <h2 id="st-vr" class="text-5xl font-black text-blue-600">0</h2>
                </div>
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-emerald-500">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Efektivitas</p>
                    <h2 id="st-pct" class="text-5xl font-black text-emerald-600">0%</h2>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-white">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b">
                            <tr>
                                <th class="p-6">Nama Sekolah</th>
                                <th class="p-6 text-center">Data Dapodik</th>
                                <th class="p-6 text-center">Realisasi VR</th>
                                <th class="p-6 text-center">Persentase</th>
                            </tr>
                        </thead>
                        <tbody id="tb-body" class="divide-y divide-slate-50 text-sm font-bold text-slate-700 uppercase"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxziioX9qXZedgZPMoYnizMj9IxeN7jHzfCDYckRRYJ87CryWvnxyLPQvacWazA-Rc/exec';
        const ACCESS = { "admin123": "PIMPINAN PUSAT", "maros2026": "MAROS", "palopo2026": "PALOPO", "tarakan2026": "TARAKAN", "makassar2026": "MAKASSAR" };
        let currentWil = "";

        function handleLogin() {
            const code = document.getElementById('access-code').value.trim();
            if (ACCESS[code]) {
                currentWil = ACCESS[code];
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('wil').innerText = currentWil;
                fetchData();
            } else {
                document.getElementById('err').classList.remove('hidden');
            }
        }

        async function fetchData() {
            try {
                // Menambahkan timestamp agar browser tidak mengambil cache lama
                const res = await fetch(SCRIPT_URL + "?nocache=" + new Date().getTime());
                const data = await res.json();
                
                const filtered = data.filter(item => {
                    if(currentWil === "PIMPINAN PUSAT") return true;
                    // Mencari kolom wilayah secara case-insensitive
                    const keyWil = Object.keys(item).find(k => k.toLowerCase().includes('wilayah') || k.toLowerCase().includes('kota'));
                    return item[keyWil]?.toString().trim().toUpperCase() === currentWil;
                });

                render(filtered);
            } catch (e) { 
                console.error(e);
                alert("Gagal memuat data. Periksa koneksi atau URL Script Bapak.");
            }
        }

        function render(data) {
            let totalVR = 0, totalDapo = 0;
            
            const rows = data.map(item => {
                // LOGIKA UNIVERSAL MAPPING: Mencari data berdasarkan berbagai kemungkinan nama kolom
                const v = parseInt(item.siswaikutvr || item.siswavr || item.ikutvr || item.pesertavr || 0);
                const d = parseInt(item.jmlsiswadapodik || item.siswadapodik || item.dapodik || item.totalsiswa || 0);
                const s = item.namasekolah || item.sekolah || item.nama_sekolah || "Sekolah Tidak Terdeteksi";

                totalVR += v; 
                totalDapo += d;
                const p = d > 0 ? ((v/d)*100).toFixed(0) : 0;

                return `<tr class="hover:bg-blue-50/50 transition-all">
                    <td class="p-6 font-black text-slate-900">${s}</td>
                    <td class="p-6 text-center font-mono text-slate-500">${d}</td>
                    <td class="p-6 text-center text-blue-600 font-black">${v}</td>
                    <td class="p-6 text-center"><span class="bg-blue-100 text-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black">${p}% CAPAIAN</span></td>
                </tr>`;
            }).join('');

            document.getElementById('st-sekolah').innerText = data.length;
            document.getElementById('st-vr').innerText = totalVR.toLocaleString('id-ID');
            document.getElementById('st-pct').innerText = (totalDapo > 0 ? ((totalVR/totalDapo)*100).toFixed(1) : 0) + '%';
            document.getElementById('tb-body').innerHTML = rows || '<tr><td colspan="4" class="p-10 text-center italic text-slate-400">Belum ada data untuk wilayah ini</td></tr>';
        }
    </script>
</body>
</html>
