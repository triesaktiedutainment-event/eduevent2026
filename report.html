<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Executive Report - Triesakti Edutainment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Penyesuaian Tinggi Grafik agar pas di HP */
        .chart-box { 
            position: relative; 
            height: 250px; /* Lebih pendek sedikit untuk HP */
            width: 100%; 
        }

        @media (min-width: 768px) {
            .chart-box { height: 320px; }
        }

        /* Smooth Scroll untuk Tabel di HP */
        .custom-scroll::-webkit-scrollbar { height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <div id="login-modal" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[999] p-6">
        <div class="bg-white p-8 md:p-10 rounded-[2.5rem] max-w-sm w-full text-center shadow-2xl">
            <img src="logo Edutainment.png" alt="Logo" class="h-14 md:h-16 mx-auto mb-6">
            <h2 class="text-xl font-extrabold uppercase mb-2 text-slate-800">Akses Pimpinan</h2>
            <p class="text-slate-400 text-[10px] mb-6 font-bold uppercase tracking-widest">Triesakti Cloud System</p>
            
            <input type="password" id="access-code" placeholder="KODE AKSES" 
                class="w-full p-4 bg-slate-100 rounded-2xl mb-4 text-center font-bold outline-none border-2 focus:border-blue-500 transition-all text-lg">
            
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition shadow-lg active:scale-95">
                BUKA LAPORAN
            </button>
            <p id="err" class="text-red-500 text-xs mt-4 hidden font-bold">Kode Salah!</p>
        </div>
    </div>

    <div id="main-content" class="hidden opacity-0 transition-opacity duration-500">
        <div class="max-w-7xl mx-auto p-4 md:p-8">
            
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 bg-white p-5 rounded-3xl shadow-sm">
                <div class="flex items-center gap-3">
                    <img src="logo Edutainment.png" alt="Logo" class="h-8">
                    <div>
                        <h1 class="text-sm md:text-lg font-black text-slate-900 uppercase">Monitoring VR</h1>
                        <p class="text-blue-600 font-bold text-[9px] md:text-[10px] uppercase tracking-widest">Wilayah: <span id="wil"></span></p>
                    </div>
                </div>
                <div class="flex w-full md:w-auto gap-2">
                    <button onclick="fetchData()" class="flex-1 md:flex-none bg-slate-100 px-4 py-2.5 rounded-xl text-[10px] font-black text-slate-600 active:bg-blue-100 uppercase">
                        <i class="fas fa-sync-alt mr-1"></i> Update
                    </button>
                    <button onclick="location.reload()" class="flex-1 md:flex-none bg-red-50 text-red-600 px-4 py-2.5 rounded-xl text-[10px] font-black active:bg-red-600 active:text-white uppercase">
                        Logout
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                <div class="glass-card p-6 rounded-[2rem] border-b-4 border-slate-800 text-center">
                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Sekolah</p>
                    <h2 id="st-sekolah" class="text-3xl md:text-5xl font-black text-slate-800">0</h2>
                </div>
                <div class="glass-card p-6 rounded-[2rem] border-b-4 border-blue-600 text-center">
                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Peserta VR</p>
                    <h2 id="st-vr" class="text-3xl md:text-5xl font-black text-blue-600">0</h2>
                </div>
                <div class="glass-card p-6 rounded-[2rem] border-b-4 border-emerald-500 text-center">
                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Capaian</p>
                    <h2 id="st-pct" class="text-3xl md:text-5xl font-black text-emerald-600">0%</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4"><i class="fas fa-chart-pie mr-1 text-blue-500"></i> Sebaran Peserta</h3>
                    <div class="chart-box"><canvas id="chartPie"></canvas></div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4"><i class="fas fa-chart-bar mr-1 text-emerald-500"></i> Performa Realisasi</h3>
                    <div class="chart-box"><canvas id="chartBar"></canvas></div>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] shadow-sm overflow-hidden border border-slate-100">
                <div class="p-5 border-b border-slate-50">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Detail Laporan Sekolah</h3>
                </div>
                <div class="overflow-x-auto custom-scroll">
                    <table class="w-full text-left min-w-[500px]">
                        <thead class="bg-slate-50 text-[9px] font-black text-slate-400 uppercase border-b">
                            <tr>
                                <th class="p-5">Nama Sekolah</th>
                                <th class="p-5 text-center">Dapodik</th>
                                <th class="p-5 text-center">VR</th>
                                <th class="p-5 text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody id="tb-body" class="divide-y divide-slate-50 text-xs font-bold text-slate-700 uppercase"></tbody>
                    </table>
                </div>
                <div class="p-4 bg-slate-50 text-center md:hidden">
                    <p class="text-[8px] text-slate-400 font-bold italic">Geser tabel ke samping untuk melihat detail <i class="fas fa-arrow-right ml-1"></i></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxziioX9qXZedgZPMoYnizMj9IxeN7jHzfCDYckRRYJ87CryWvnxyLPQvacWazA-Rc/exec';
        const ACCESS = { 
            "admin123": "PIMPINAN PUSAT", 
            "maros2026": "MAROS", 
            "palopo2026": "PALOPO", 
            "tarakan2026": "TARAKAN", 
            "makassar2026": "MAKASSAR" 
        };
        let currentWil = "";
        let charts = {};

        function handleLogin() {
            const code = document.getElementById('access-code').value.trim();
            if (ACCESS[code]) {
                currentWil = ACCESS[code];
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                setTimeout(() => document.getElementById('main-content').classList.add('opacity-100'), 50);
                document.getElementById('wil').innerText = currentWil;
                fetchData();
            } else {
                document.getElementById('err').classList.remove('hidden');
            }
        }

        async function fetchData() {
            try {
                const res = await fetch(SCRIPT_URL + "?nocache=" + new Date().getTime());
                const data = await res.json();
                const filtered = data.filter(item => {
                    if(currentWil === "PIMPINAN PUSAT") return true;
                    const keyWil = Object.keys(item).find(k => k.toLowerCase().includes('wilayah') || k.toLowerCase().includes('kota'));
                    return item[keyWil]?.toString().trim().toUpperCase() === currentWil;
                });
                render(filtered);
            } catch (e) { console.error(e); }
        }

        function render(data) {
            let totalVR = 0, totalDapo = 0, labels = [], values = [];
            
            const rows = data.map(item => {
                const v = parseInt(item.siswaikutvr || item.siswavr || 0);
                const d = parseInt(item.jmlsiswadapodik || item.siswadapodik || 0);
                const s = item.namasekolah || "Sekolah";

                totalVR += v; totalDapo += d;
                labels.push(s.length > 15 ? s.substring(0,12)+'...' : s);
                values.push(v);

                const p = d > 0 ? ((v/d)*100).toFixed(0) : 0;
                return `<tr class="hover:bg-slate-50 transition-all">
                    <td class="p-5 font-extrabold text-slate-800">${s}</td>
                    <td class="p-5 text-center font-mono text-slate-400">${d}</td>
                    <td class="p-5 text-center text-blue-600 font-black">${v}</td>
                    <td class="p-5 text-center"><span class="bg-blue-100 text-blue-600 px-3 py-1.5 rounded-full text-[9px] font-black">${p}%</span></td>
                </tr>`;
            }).join('');

            document.getElementById('st-sekolah').innerText = data.length;
            document.getElementById('st-vr').innerText = totalVR.toLocaleString('id-ID');
            document.getElementById('st-pct').innerText = (totalDapo > 0 ? ((totalVR/totalDapo)*100).toFixed(1) : 0) + '%';
            document.getElementById('tb-body').innerHTML = rows || '<tr><td colspan="4" class="p-10 text-center uppercase font-bold text-slate-400">Data Kosong</td></tr>';

            updateCharts(labels, values);
        }

        function updateCharts(labels, values) {
            const colors = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];
            if(charts.pie) charts.pie.destroy();
            if(charts.bar) charts.bar.destroy();

            charts.pie = new Chart(document.getElementById('chartPie'), {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: values, backgroundColor: colors, borderWeight: 0 }] },
                options: {
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 9, weight: 'bold' } } } }
                }
            });

            charts.bar = new Chart(document.getElementById('chartBar'), {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: 'Siswa VR', data: values, backgroundColor: '#10b981', borderRadius: 6 }] },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { font: { size: 9 } } }, x: { ticks: { font: { size: 8 } } } }
                }
            });
        }
    </script>
</body>
</html>
