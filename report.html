<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Report - Triesakti Edutainment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .three-d-shadow {
            filter: drop-shadow(0px 10px 8px rgba(0,0,0,0.15));
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div id="login-modal" class="fixed inset-0 bg-slate-900/95 flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-[2rem] p-10 max-w-sm w-full shadow-2xl border border-slate-200 text-center">
            <img src="logo Edutainment.png" alt="Logo" class="h-16 mx-auto mb-6 drop-shadow-md">
            <h2 class="text-xl font-black text-slate-800 uppercase mb-2">Akses Pimpinan</h2>
            <input type="password" id="access-code" placeholder="Kode Akses..." 
                class="w-full p-4 bg-slate-50 border-2 border-slate-100 focus:border-blue-500 rounded-2xl outline-none text-center font-bold tracking-widest mb-4">
            <button onclick="checkAccess()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl hover:bg-blue-600 transition shadow-lg">BUKA LAPORAN</button>
            <p id="login-error" class="text-red-500 text-xs mt-4 hidden font-bold">Kode Akses Salah!</p>
        </div>
    </div>

    <div id="main-content" class="hidden opacity-0 transition-opacity duration-700">
        <div class="max-w-7xl mx-auto p-4 md:p-8">
            
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <div class="flex items-center gap-4">
                    <img src="logo Edutainment.png" alt="Logo" class="h-14 three-d-shadow">
                    <div>
                        <h1 class="text-2xl font-black text-slate-900 uppercase leading-none">Monitoring Event VR</h1>
                        <p class="text-blue-600 font-bold text-xs mt-1 uppercase tracking-widest">Wilayah: <span id="access-level"></span></p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="fetchData()" class="bg-white px-5 py-2.5 rounded-xl text-xs font-bold text-slate-700 shadow-sm hover:bg-slate-50 border border-slate-200">
                        <i class="fas fa-sync mr-2"></i> REFRESH
                    </button>
                    <button onclick="location.reload()" class="bg-red-50 text-red-600 px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-red-100 transition">LOGOUT</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass-card p-6 rounded-[2rem] border-l-8 border-l-slate-800">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Sekolah Terdata</p>
                    <h2 id="stat-sekolah" class="text-4xl font-black text-slate-800">0</h2>
                </div>
                <div class="glass-card p-6 rounded-[2rem] border-l-8 border-l-blue-600">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Peserta VR</p>
                    <h2 id="stat-vr" class="text-4xl font-black text-blue-600">0</h2>
                </div>
                <div class="glass-card p-6 rounded-[2rem] border-l-8 border-l-emerald-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Efektivitas</p>
                    <h2 id="stat-persen" class="text-4xl font-black text-emerald-600">0%</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <div class="lg:col-span-8 glass-card p-8 rounded-[2.5rem]">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6 flex items-center">
                        <i class="fas fa-chart-bar mr-2 text-blue-500"></i> Grafik Partisipasi Sekolah
                    </h3>
                    <div class="h-[350px]">
                        <canvas id="chartUtama"></canvas>
                    </div>
                </div>

                <div class="lg:col-span-4 glass-card p-8 rounded-[2.5rem] flex flex-col items-center">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6 self-start">
                        <i class="fas fa-chart-pie mr-2 text-purple-500"></i> Distribusi VR
                    </h3>
                    <div class="h-[250px] w-full relative">
                        <canvas id="chartLingkaran"></canvas>
                    </div>
                    <div id="doughnut-legend" class="mt-4 w-full text-[10px] font-bold text-slate-500 grid grid-cols-2 gap-2"></div>
                </div>

                <div class="lg:col-span-12 glass-card rounded-[2.5rem] overflow-hidden">
                    <div class="p-6 border-b border-slate-100 font-black text-xs uppercase tracking-widest text-slate-400 bg-white/50">
                        Rincian Detail per Sekolah
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] uppercase font-black text-slate-400">
                                <tr>
                                    <th class="p-5">Nama Sekolah</th>
                                    <th class="p-5">Wilayah</th>
                                    <th class="p-5 text-center">Dapodik</th>
                                    <th class="p-5 text-center">VR</th>
                                    <th class="p-5 text-center">Prosentase</th>
                                </tr>
                            </thead>
                            <tbody id="tabel-body" class="divide-y divide-slate-100 text-sm font-semibold text-slate-700"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxakRVXqjxR4LLLrtnFL_c1vudbIGlaW0WapsfUiRsO3JMYhCGzmiRHWIBWfvlbdzg7/exec';
        
        const ACCESS_KEYS = {
            "admin123": "PIMPINAN PUSAT",
            "maros2026": "MAROS",
            "makassar2026": "MAKASSAR",
            "palopo2026": "PALOPO",
            "tarakan2026": "TARAKAN"
        };

        let currentAccess = "";
        let charts = {};

        function checkAccess() {
            const code = document.getElementById('access-code').value;
            if (ACCESS_KEYS[code]) {
                currentAccess = ACCESS_KEYS[code];
                document.getElementById('login-modal').style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
                setTimeout(() => document.getElementById('main-content').classList.add('opacity-100'), 50);
                document.getElementById('access-level').innerText = currentAccess;
                fetchData();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        async function fetchData() {
            try {
